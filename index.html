<!DOCTYPE html>
<html>
<head>
    <title>RPS Pro Modes</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #111, #000);
            color: #fff;
            font-family: Arial;
            text-align: center;
        }

        h1 { margin-top: 20px; font-size: 42px; }

        #modes {
            margin-top: 15px;
        }

        .modeBtn {
            padding: 10px 18px;
            margin: 5px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: #222;
            color: white;
        }

        .active { background: #555; }

        #buttons { margin-top: 25px; }

        button.play {
            padding: 18px 28px;
            margin: 10px;
            font-size: 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background: #222;
            color: white;
            transition: 0.2s;
        }

        button.play:hover { transform: scale(1.1); background: #333; }

        #arena {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 60px;
            font-size: 26px;
        }

        .choiceBox {
            padding: 20px 30px;
            border-radius: 15px;
            background: #111;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            min-width: 160px;
        }

        #result { margin-top: 30px; font-size: 26px; min-height: 60px; }
        #score { margin-top: 15px; font-size: 18px; }
        #round { margin-top: 10px; font-size: 16px; color: #aaa; }
    </style>
</head>
<body>

<h1>RPS Pro Modes 😈</h1>
<p>Best of 3. Pick a difficulty.</p>

<div id="modes">
    <button class="modeBtn active" onclick="setMode('easy', this)">Easy</button>
    <button class="modeBtn" onclick="setMode('mid', this)">Mid</button>
    <button class="modeBtn" onclick="setMode('impossible', this)">Impossible</button>
</div>

<div id="buttons">
    <button class="play" onclick="play('rock')">🪨 Rock</button>
    <button class="play" onclick="play('paper')">📄 Paper</button>
    <button class="play" onclick="play('scissors')">✂️ Scissors</button>
</div>

<div id="arena">
    <div class="choiceBox" id="playerBox">You: ?</div>
    <div class="choiceBox" id="cpuBox">CPU: ?</div>
</div>

<div id="result"></div>
<div id="score">Wins: 0 | Losses: 0</div>
<div id="round">Round: 1 / 3</div>

<script>
let wins = 0;
let losses = 0;
let round = 1;
let mode = "easy";

function setMode(m, btn) {
    mode = m;
    document.querySelectorAll('.modeBtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function getCounterMove(p) {
    if (p === "rock") return "paper";
    if (p === "paper") return "scissors";
    return "rock";
}

function getLosingMove(p) {
    if (p === "rock") return "scissors";
    if (p === "paper") return "rock";
    return "paper";
}

function chooseMove(player) {
    let rand = Math.random();

    if (mode === "easy") {
        if (rand < 0.4) return getCounterMove(player);
        if (rand < 0.8) return getLosingMove(player);
        return player;
    }

    if (mode === "mid") {
        if (rand < 0.65) return getCounterMove(player);
        if (rand < 0.9) return getLosingMove(player);
        return player;
    }

    if (mode === "impossible") {
        if (rand < 0.9) return getCounterMove(player);
        if (rand < 0.97) return player;
        return getLosingMove(player);
    }
}

function play(player) {
    if (round > 3) return;

    document.getElementById("result").innerHTML = "🤔 Thinking...";
    document.getElementById("playerBox").innerHTML = "You: " + player;

    setTimeout(() => {
        let computer = chooseMove(player);

        document.getElementById("cpuBox").innerHTML = "CPU: " + computer;

        if (computer !== player) {
            if (computer === getCounterMove(player)) losses++;
            else wins++;
        }

        document.getElementById("score").innerHTML =
            "Wins: " + wins + " | Losses: " + losses;

        round++;
        document.getElementById("round").innerHTML = "Round: " + Math.min(round,3) + " / 3";

        if (round > 3) {
            setTimeout(() => {
                let final;
                if (wins > losses) final = "🏆 YOU WIN THE MATCH";
                else if (losses > wins) final = "😈 CPU WINS THE MATCH";
                else final = "🤝 DRAW MATCH";

                document.getElementById("result").innerHTML = final + "<br><br>Click to play again";

                wins = 0;
                losses = 0;
                round = 1;
                document.getElementById("score").innerHTML = "Wins: 0 | Losses: 0";
                document.getElementById("round").innerHTML = "Round: 1 / 3";
                document.getElementById("playerBox").innerHTML = "You: ?";
                document.getElementById("cpuBox").innerHTML = "CPU: ?";
            }, 800);
        }

    }, 600);
}
</script>

</body>
</html>
