<!DOCTYPE html>
<html>
<head>
    <title>Impossible RPS Pro+</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #111, #000);
            color: #fff;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            font-size: 42px;
            letter-spacing: 1px;
        }

        #buttons {
            margin-top: 30px;
        }

        button {
            padding: 18px 28px;
            margin: 10px;
            font-size: 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background: #222;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.1);
            background: #333;
        }

        #arena {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 60px;
            font-size: 28px;
        }

        .choiceBox {
            padding: 20px 30px;
            border-radius: 15px;
            background: #111;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            min-width: 160px;
        }

        #result {
            margin-top: 30px;
            font-size: 26px;
            min-height: 60px;
        }

        #score {
            margin-top: 20px;
            font-size: 18px;
        }

        #round {
            margin-top: 10px;
            font-size: 16px;
            color: #aaa;
        }
    </style>
</head>
<body>

<h1>Impossible RPS Pro+ 😈</h1>
<p>Best of 3. Think you can win?</p>

<div id="buttons">
    <button onclick="play('rock')">🪨 Rock</button>
    <button onclick="play('paper')">📄 Paper</button>
    <button onclick="play('scissors')">✂️ Scissors</button>
</div>

<div id="arena">
    <div class="choiceBox" id="playerBox">You: ?</div>
    <div class="choiceBox" id="cpuBox">CPU: ?</div>
</div>

<div id="result"></div>
<div id="score">Wins: 0 | Losses: 0</div>
<div id="round">Round: 1 / 3</div>

<script>
let wins = 0;
let losses = 0;
let round = 1;

function getCounterMove(player) {
    if (player === "rock") return "paper";
    if (player === "paper") return "scissors";
    if (player === "scissors") return "rock";
}

function getLosingMove(player) {
    if (player === "rock") return "scissors";
    if (player === "paper") return "rock";
    if (player === "scissors") return "paper";
}

function play(player) {
    if (round > 3) return;

    document.getElementById("result").innerHTML = "🤔 Thinking...";
    document.getElementById("playerBox").innerHTML = "You: " + player;

    setTimeout(() => {
        let computer;

        let rand = Math.random();

        // 70% win for CPU, 20% lose, 10% tie
        if (rand < 0.7) {
            computer = getCounterMove(player);
        } else if (rand < 0.9) {
            computer = getLosingMove(player);
        } else {
            computer = player;
        }

        document.getElementById("cpuBox").innerHTML = "CPU: " + computer;

        let resultText;

        if (computer === player) {
            resultText = "😐 Tie";
        } else if (computer === getCounterMove(player)) {
            losses++;
            resultText = "💀 You Lose";
        } else {
            wins++;
            resultText = "🎉 You Win";
        }

        document.getElementById("result").innerHTML = resultText;
        document.getElementById("score").innerHTML =
            "Wins: " + wins + " | Losses: " + losses;

        round++;
        document.getElementById("round").innerHTML = "Round: " + Math.min(round,3) + " / 3";

        // End of best of 3
        if (round > 3) {
            setTimeout(() => {
                let final;
                if (wins > losses) final = "🏆 YOU WON THE MATCH?!";
                else if (losses > wins) final = "😈 CPU WINS THE MATCH";
                else final = "🤝 DRAW MATCH";

                document.getElementById("result").innerHTML = final + "<br><br>Click any move to play again";

                // reset
                wins = 0;
                losses = 0;
                round = 1;
                document.getElementById("score").innerHTML = "Wins: 0 | Losses: 0";
                document.getElementById("round").innerHTML = "Round: 1 / 3";
                document.getElementById("playerBox").innerHTML = "You: ?";
                document.getElementById("cpuBox").innerHTML = "CPU: ?";
            }, 1000);
        }

    }, 700);
}
</script>

</body>
</html>
